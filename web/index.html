<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Bili Downloader</title>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-black text-indigo-600 mb-6 text-center">BILI DOWNLOADER</h2>
        
        <textarea id="urls" rows="6" 
            class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-400 outline-none transition-all text-sm"
            placeholder="粘贴链接到这里，每行一个..."></textarea>
        
        <button onclick="start()" 
            class="w-full mt-6 bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-100">
            开始下载任务
        </button>

        <div id="log" class="mt-4 text-xs text-slate-400 max-h-40 overflow-y-auto"></div>
    </div>

    <script>
        function start() {
            const urls = document.getElementById('urls').value.split('\n');
            eel.download_tasks(urls);
            document.getElementById('log').innerHTML += "<div>任务已提交...</div>";
        }
        
        eel.expose(notify_js);
        function notify_js(msg) {
            document.getElementById('log').innerHTML += `<div>${msg}</div>`;
        }
    </script>
</body>
</html>
